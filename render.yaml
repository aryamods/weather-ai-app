services:
  - type: web
    name: weatherai
    runtime: python
    repo: https://github.com/aryamods/weatherai
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0